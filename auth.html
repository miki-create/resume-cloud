<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Resume.Maker</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --dark: #09090b;
            --surface: #0f172a;
            --card: rgba(15, 23, 42, 0.95);
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; background: radial-gradient(circle at top, rgba(0,242,254,0.15), transparent 30%), #020617; color: var(--text); display: flex; align-items: center; justify-content: center; padding: 20px; }

        .card {
            width: min(520px, 100%);
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 36px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.35);
        }

        h1 { font-size: 2.3rem; margin-bottom: 12px; }
        p { color: #94a3b8; margin-bottom: 24px; }
        .tabs { display: flex; gap: 16px; margin-bottom: 28px; }
        .tab { flex: 1; text-align: center; padding: 14px 0; border-radius: 16px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #09090b; border-color: transparent; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.6px; }
        input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); background: rgba(15,23,42,0.9); color: #fff; font-size: 0.95rem; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,242,254,0.12); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #09090b; font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .link { margin-top: 18px; text-align: center; color: #94a3b8; font-size: 0.88rem; }
        .link a { color: var(--primary); text-decoration: none; }
        .message { margin-top: 18px; color: #f8fafc; font-size: 0.9rem; min-height: 22px; }
        .footer { margin-top: 20px; text-align: center; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="authTitle">Login to Resume.Maker</h1>
        <p id="authSubtitle">Access your workspace and build resumes securely with Firebase Authentication.</p>

        <div class="tabs">
            <div class="tab active" id="loginTab" onclick="setMode('login')">Login</div>
            <div class="tab" id="registerTab" onclick="setMode('register')">Register</div>
        </div>

        <div class="form-group">
            <label for="emailInput">Email</label>
            <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
        </div>

        <button class="btn" id="authButton" onclick="handleAuthAction()">Login</button>
        <div class="message" id="authMessage"></div>
        <div class="footer">Firebase Auth is used for login and registration.</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
